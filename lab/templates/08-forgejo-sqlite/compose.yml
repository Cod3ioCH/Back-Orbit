name: bo-lab-forgejo-sqlite
services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:16
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LAB_PORT:-18108}:3000"
      - "127.0.0.1:${LAB_SSH_PORT:-18208}:22"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /data/forgejo/forgejo.db
    volumes:
      - forgejo-data:/data
volumes:
  forgejo-data:
