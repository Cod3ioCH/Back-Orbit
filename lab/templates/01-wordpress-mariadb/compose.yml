name: bo-lab-wordpress-mariadb
services:
  database:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD_FILE: /run/secrets/mariadb_password
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
    secrets: [mariadb_password, mariadb_root_password]
    volumes:
      - database-data:/var/lib/mysql
    healthcheck:
      test: [CMD, healthcheck.sh, --connect, --innodb_initialized]
      interval: 10s
      timeout: 5s
      retries: 10
  wordpress:
    image: wordpress:6-apache
    restart: unless-stopped
    depends_on:
      database: {condition: service_healthy}
    ports: ["127.0.0.1:${LAB_PORT:-18101}:80"]
    environment:
      WORDPRESS_DB_HOST: database
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/mariadb_password
    secrets: [mariadb_password]
    volumes:
      - wordpress-data:/var/www/html
secrets:
  mariadb_password: {file: ./secrets/mariadb_password}
  mariadb_root_password: {file: ./secrets/mariadb_root_password}
volumes:
  database-data:
  wordpress-data:
