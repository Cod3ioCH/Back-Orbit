# Local installation / evaluation setup: Back-Orbit talks to the Docker
# daemon directly over the mounted socket. This is the simplest way to try
# Back-Orbit, but be aware that mounting /var/run/docker.sock gives this
# container root-equivalent control of the host — see
# docs/threat-model.md and README.md#security-note-the-docker-socket.
#
# For a production deployment, prefer docker-compose.socket-proxy.yml
# instead, and always put Back-Orbit behind a TLS-terminating reverse proxy.
#
# Usage: docker compose -f deploy/docker-compose.yml up --build

services:
  back-orbit:
    build:
      context: ..
      dockerfile: Dockerfile
    image: back-orbit:local
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BACKORBIT_HTTP_ADDR: 0.0.0.0:8080
      BACKORBIT_DATA_DIR: /var/lib/back-orbit
      BACKORBIT_DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - back-orbit-data:/var/lib/back-orbit
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # The container's non-root user (uid 10001) needs permission to read
    # the socket. Default (0 = root) is correct for Docker Desktop (macOS/
    # Windows), where the socket is always owned by root inside its Linux
    # VM regardless of host-side permissions. On native Linux Docker, the
    # daemon's socket is usually owned by a "docker" group instead — find
    # its GID from inside a container (works everywhere, unlike a host-side
    # `stat`, which can be misleading on Docker Desktop):
    #   docker run --rm -v /var/run/docker.sock:/var/run/docker.sock alpine stat -c '%g' /var/run/docker.sock
    # then set DOCKER_GID to that value in a .env file next to this one.
    group_add:
      - "${DOCKER_GID:-0}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  back-orbit-data:
