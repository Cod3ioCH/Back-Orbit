# Example: unattended master-key unlock via a Docker secret.
#
# Back-Orbit's encrypted secret store (see docs/adr/0004-secret-store-crypto.md)
# is not implemented yet — this file documents the intended deployment
# pattern ahead of that phase so the operational story is clear early, but
# BACKORBIT_MASTER_KEY_FILE is not yet read by the running binary.
#
# Once implemented, this is how Back-Orbit avoids ever wanting the master
# key in a plain environment variable: the secret is mounted as a file only
# the container can read, and the app is told where to find it.
#
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.secret.yml up --build

services:
  back-orbit:
    environment:
      BACKORBIT_MASTER_KEY_FILE: /run/secrets/backorbit_master_key
    secrets:
      - backorbit_master_key

secrets:
  backorbit_master_key:
    file: ./secrets/backorbit_master_key.txt
