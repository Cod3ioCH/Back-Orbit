# Unattended master-passphrase unlock via a Docker secret.
#
# Back-Orbit's secret store (docs/adr/0004-secret-store-crypto.md) holds every
# repository and database credential encrypted at rest. The master passphrase
# that unlocks it is never stored, so after a restart the store comes up
# locked — and a locked store means scheduled backups cannot read repository
# passwords and simply stop.
#
# Mounting the passphrase as a Docker secret is how that is avoided without a
# human present. The file is readable only by the container, and Back-Orbit is
# told where to find it. There is deliberately no environment variable for
# this: the value protecting every other credential should not appear in
# `docker inspect`, crash dumps or child processes.
#
# Create the secret file first, readable only by you:
#   mkdir -p deploy/secrets
#   printf '%s' 'your-long-master-passphrase' > deploy/secrets/backorbit_master_key.txt
#   chmod 600 deploy/secrets/backorbit_master_key.txt
#
# Back-Orbit refuses a key file that group or others can read, so the chmod is
# not optional.
#
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.secret.yml up --build

services:
  back-orbit:
    environment:
      BACKORBIT_MASTER_KEY_FILE: /run/secrets/backorbit_master_key
    secrets:
      - backorbit_master_key

secrets:
  backorbit_master_key:
    file: ./secrets/backorbit_master_key.txt
